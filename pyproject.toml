[dependency-groups]
dev = [
  "prek>=0.4.4",
  "pytest>=9.0.3",
  "pytest-asyncio>=1.4",
  "ruff>=0.15.16",
  "ty>=0.0.44",
]
docs = [
  "mkdocs-material>=9.7.6",
]
bench = [
  "datasets<4",
  "deepeval>=4.0.6",
  "huggingface-hub<1",
  "matplotlib>=3.11",
  "pandas>=3.0.3",
]
examples = [
  "langchain>=1.3.4",
  "langchain-openai>=1.2.2",
  "pydantic-ai-slim[openai]>=1.106",
  "python-dotenv>=1.2.2",
]

[tool.uv]
workspace.members = [ "packages/*" ]

[tool.pytest]
ini_options.testpaths = [ "packages/fedotmas/tests", "packages/fedotmas-llm/tests", "packages/fedotmas-meta/tests" ]
ini_options.asyncio_mode = "auto"
ini_options.asyncio_default_fixture_loop_scope = "function"
