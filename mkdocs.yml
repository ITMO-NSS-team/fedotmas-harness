site_name: fedotmas-harness
site_description: Agent systems generation and harness
repo_url: https://github.com/ITMO-NSS-Team/fedotmas-harness
repo_name: ITMO-NSS-Team/fedotmas-harness

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details        # collapsible hints (??? / ???+)
  - pymdownx.superfences    # nested/annotated code fences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [packages/fedotmas/src, packages/fedotmas-llm/src]
          options:
            show_root_heading: true
            show_source: false
            heading_level: 3
            members_order: source

nav:
  - Home: index.md
  - Core:
    - Concepts: core/concepts.md
    - Engine: core/engine.md
    - Flow: core/flow.md
    - Blackboard: core/blackboard.md
    - DSL: core/dsl.md
  - LLM extension:
    - Overview: llm/index.md
    - Agents & rules: llm/agents.md
  - API:
    - fedotmas: api/fedotmas.md
    - fedotmas_llm: api/fedotmas_llm.md
