site_name: fedotmas-harness
site_description: Agent systems generation and harness
repo_url: https://github.com/ITMO-NSS-Team/fedotmas-harness
repo_name: ITMO-NSS-Team/fedotmas-harness

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.top
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details        # collapsible hints (??? / ???+)
  - pymdownx.superfences    # nested/annotated code fences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Concepts: concepts.md
  - Engine: engine.md
  - Flow: flow.md
  - Blackboard: blackboard.md
  - DSL: dsl.md
